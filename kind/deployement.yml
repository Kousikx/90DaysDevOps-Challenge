kind: Deployment
apiVersion: apps/v1

metadata: 
  name: flask-deployment
  namespace: flask-app-ns
  labels:
    app: flask-pod-label
spec:
  replicas: 4
  selector:
    matchLabels:
      app: flask-pod-label
  template: 
    metadata:
      labels:
        app: flask-pod-label
    spec:
      containers:
      - name: flask-app-n
        image: trainwithshubham/github-actions-app:latest
        ports:
        - containerPort: 80

