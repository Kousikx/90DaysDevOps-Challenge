<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 31 - My Docker Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            max-width: 600px;
            width: 90%;
            animation: fadeIn 1.2s ease-in-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .badge {
            display: inline-block;
            padding: 10px 20px;
            background: #00c6ff;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            h1 {
                font-size: 1.8rem;
            }
            .card {
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 Day 31 - My Docker Website</h1>
        <p>Successfully deployed using <strong>Nginx Alpine</strong> inside a Docker container.</p>
        <div class="badge">Built with Dockerfile</div>
        <div class="footer">
            DevOps Journey | Shipping Containers Like a Pro 🐳
        </div>
    </div>

</body>
</html>
